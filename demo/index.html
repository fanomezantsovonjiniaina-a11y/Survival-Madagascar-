<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Survie Madagascar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a0a00;overflow:hidden;font-family:'Segoe UI',sans-serif;}
canvas{display:block;}
#hud{position:fixed;top:0;left:0;right:0;padding:10px 16px;display:flex;align-items:center;gap:14px;
  background:linear-gradient(180deg,rgba(0,0,0,.75) 0%,transparent 100%);pointer-events:none;}
.sv{display:flex;align-items:center;gap:5px;}
.sv span{font-size:16px;}
.bw{width:72px;height:8px;border-radius:4px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);}
.bf{height:100%;border-radius:4px;transition:width .25s;}
#bHp .bf{background:linear-gradient(90deg,#ff4444,#ff0000);}
#bFm .bf{background:linear-gradient(90deg,#ff9900,#ff6600);}
#bSo .bf{background:linear-gradient(90deg,#44aaff,#0077dd);}
#bFt .bf{background:linear-gradient(90deg,#aa44ff,#7700cc);}
#clock{margin-left:auto;color:#fff;font-size:14px;font-weight:700;text-shadow:0 0 10px gold;}
#msg{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);max-width:340px;
  background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;
  border:1px solid rgba(255,255,255,.2);text-align:center;line-height:1.5;
  opacity:0;transition:opacity .4s;pointer-events:none;}
#hint{position:fixed;bottom:148px;left:50%;transform:translateX(-50%);
  background:rgba(0,80,0,.8);color:#5fff7a;padding:5px 16px;border-radius:12px;font-size:12px;
  font-weight:700;border:1px solid rgba(95,255,122,.4);opacity:0;transition:opacity .3s;pointer-events:none;}
#zone{position:fixed;top:52px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);color:#fff;padding:5px 16px;border-radius:14px;font-size:13px;font-weight:700;
  letter-spacing:.5px;opacity:0;transition:opacity .5s;pointer-events:none;}
#dpad{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:3px;}
.dr{display:flex;gap:3px;}
.db{width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,.1);
  border:2px solid rgba(255,255,255,.22);color:#fff;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;touch-action:manipulation;transition:background .1s;}
.db:active{background:rgba(255,255,255,.3);}
#actBtn{position:fixed;bottom:12px;right:16px;width:64px;height:64px;
  border-radius:50%;background:rgba(46,180,90,.3);border:3px solid rgba(46,180,90,.7);
  color:#5fff7a;font-size:11px;font-weight:900;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:manipulation;}
#actBtn:active{background:rgba(46,180,90,.6);}
#mm{position:fixed;top:54px;right:10px;width:92px;height:92px;border-radius:8px;
  border:1px solid rgba(255,255,255,.3);overflow:hidden;}
#mm canvas{width:92px;height:92px;}
#night{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity 4s;
  background:radial-gradient(ellipse at 50% 40%,rgba(0,0,40,.2) 100px,rgba(0,0,20,.92) 500px);}
</style>
</head>
<body>
<canvas id="g"></canvas>
<div id="hud">
  <div class="sv"><span>❤️</span><div class="bw" id="bHp"><div class="bf" style="width:100%"></div></div></div>
  <div class="sv"><span>🍖</span><div class="bw" id="bFm"><div class="bf" style="width:100%"></div></div></div>
  <div class="sv"><span>💧</span><div class="bw" id="bSo"><div class="bf" style="width:100%"></div></div></div>
  <div class="sv"><span>😴</span><div class="bw" id="bFt"><div class="bf" style="width:20%"></div></div></div>
  <div id="clock">☀️ Jour 1 · 08:00</div>
</div>
<div id="zone">Forêt Tropicale</div>
<div id="msg"></div>
<div id="hint">E — Interagir</div>
<div id="night"></div>
<div id="dpad">
  <div class="dr"><div class="db" id="bU">▲</div></div>
  <div class="dr"><div class="db" id="bL">◀</div><div class="db" id="bD">▼</div><div class="db" id="bR">▶</div></div>
</div>
<div id="actBtn" id="bA">E<br>AGIR</div>
<div id="mm"><canvas id="mc" width="92" height="92"></canvas></div>
<script>
// ═══════════════════════════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════════════════════════
const gc=document.getElementById('g'),ctx=gc.getContext('2d');
const mc=document.getElementById('mc'),mctx=mc.getContext('2d');
let W=gc.width=innerWidth, H=gc.height=innerHeight;
window.onresize=()=>{W=gc.width=innerWidth;H=gc.height=innerHeight;};

// ═══════════════════════════════════════════════════════════════════
//  WORLD
// ═══════════════════════════════════════════════════════════════════
const TS=64, COLS=72, ROWS=72;
const WW=COLS*TS, WH=ROWS*TS;
const T={GRASS:0,FOREST:1,WATER:2,SAND:3,HOUSE:4,ROAD:5,FLOWER:6,BUSH:7,MUD:8,STONE:9};
const WK=new Set([0,1,3,5,6,7,9]);
const map=Array.from({length:ROWS},()=>new Uint8Array(COLS));

// Random helpers
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const d2=(ax,ay,bx,by)=>Math.sqrt((ax-bx)**2+(ay-by)**2);

// ─── Noise (simple) ────────────────────────────────────────────────
function hash(x,y){let h=(x*374761393+y*668265263)^(x>>3)^(y>>5);return((h^(h>>15))*0x46bc32e6)&0x7fffffff;}
function noise(x,y){return(hash(x,y)%1000)/1000;}

// ─── Generate ──────────────────────────────────────────────────────
(function gen(){
  // Base grass with variation
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)map[r][c]=T.GRASS;

  // River — west side, wavy
  for(let r=8;r<ROWS-4;r++){
    const cx=10+Math.round(Math.sin(r*.2)*3+Math.cos(r*.07)*2);
    for(let d=-2;d<=2;d++)if(cx+d>=0&&cx+d<COLS)map[r][cx+d]=T.WATER;
    for(let d=-3;d<=3;d++){const s=cx+d;if(s>=0&&s<COLS&&map[r][s]!==T.WATER)map[r][s]=T.SAND;}
  }
  // Lake — NE corner
  for(let r=5;r<20;r++)for(let c=52;c<68;c++)if(d2(r,c,12,60)<9)map[r][c]=T.WATER;
  for(let r=5;r<20;r++)for(let c=52;c<68;c++){const dd=d2(r,c,12,60);if(dd>=9&&dd<10.5)map[r][c]=T.SAND;}

  // Dense forest — large area
  for(let r=3;r<55;r++)for(let c=14;c<50;c++)
    if(d2(r,c,25,30)<22&&map[r][c]===T.GRASS&&noise(r,c)>.28)map[r][c]=T.FOREST;

  // Savane south
  for(let r=56;r<ROWS-1;r++)for(let c=4;c<COLS-4;c++)
    if(map[r][c]===T.GRASS&&noise(r+200,c)>.55)map[r][c]=T.BUSH;

  // Flowers
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    if(map[r][c]===T.GRASS&&noise(r+100,c+100)>.82)map[r][c]=T.FLOWER;

  // Mud patches near river
  for(let r=8;r<ROWS-4;r++){
    const cx=10+Math.round(Math.sin(r*.2)*3+Math.cos(r*.07)*2)+4;
    if(cx<COLS&&map[r][cx]===T.GRASS)map[r][cx]=T.MUD;
  }

  // ─── VILLAGE ────────────────────────────────────────────────────
  buildVillage(36,38);
})();

const objs=[];
function buildVillage(VR,VC){
  // Main plaza — cobblestone road
  for(let r=VR-9;r<=VR+9;r++)for(let c=VC-9;c<=VC+9;c++)
    if(r>=0&&r<ROWS&&c>=0&&c<COLS)map[r][c]=T.ROAD;
  // Central fountain area
  for(let r=VR-2;r<=VR+2;r++)for(let c=VC-2;c<=VC+2;c++)
    if(r>=0&&r<ROWS&&c>=0&&c<COLS)map[r][c]=T.STONE;

  // Houses arranged in a realistic village pattern
  const houseDefs=[
    // [row, col, w, h, color, type]
    [VR-8,VC-8,  3,4,'malagasy_big'],
    [VR-8,VC-3,  3,3,'malagasy'],
    [VR-8,VC+2,  4,4,'malagasy_big'],
    [VR-8,VC+7,  3,3,'malagasy'],
    [VR+4,VC-8,  4,4,'malagasy_big'],
    [VR+4,VC-3,  3,3,'malagasy'],
    [VR+4,VC+2,  3,4,'malagasy_big'],
    [VR+4,VC+7,  3,3,'malagasy'],
    [VR-3,VC-9,  3,3,'malagasy'],
    [VR+1,VC+8,  3,3,'malagasy'],
    [VR-3,VC+8,  3,4,'malagasy_big'],
  ];
  houseDefs.forEach(([hr,hc,hw,hh,tp])=>{
    for(let dr=0;dr<hh;dr++)for(let dc=0;dc<hw;dc++)
      if(hr+dr>=0&&hr+dr<ROWS&&hc+dc>=0&&hc+dc<COLS)map[hr+dr][hc+dc]=T.HOUSE;
    objs.push({type:'house',row:hr+Math.floor(hh/2),col:hc+Math.floor(hw/2),style:tp,
      w:hw*TS,h:hh*TS,or:hr,oc:hc,ow:hw,oh:hh});
  });

  // Roads to forest and river
  for(let c=14;c<VC-9;c++)if(map[VR][c]===T.GRASS||map[VR][c]===T.FOREST)map[VR][c]=T.ROAD;
  for(let r=VR+9;r<60;r++)if(map[r][VC]===T.GRASS||map[r][VC]===T.BUSH)map[r][VC]=T.ROAD;
  for(let r=VR-9;r>8;r--)if(map[r][VC]===T.GRASS||map[r][VC]===T.FOREST)map[r][VC]=T.ROAD;
  for(let c=VC+9;c<COLS-2;c++)if(map[VR][c]===T.GRASS||map[VR][c]===T.FOREST)map[VR][c]=T.ROAD;

  // Trees around village
  for(let r=VR-12;r<=VR+12;r++)for(let c=VC-12;c<=VC+12;c++){
    const dd=d2(r,c,VR,VC);
    if(dd>10&&dd<13&&r>=0&&r<ROWS&&c>=0&&c<COLS&&map[r][c]===T.GRASS)map[r][c]=T.FOREST;
  }

  // Interactive objects
  objs.push({type:'well',   row:VR,   col:VC,   label:'Puits — Boire',        action:'drink'});
  objs.push({type:'fire',   row:VR-1, col:VC-1, label:'Feu de camp — Repos',  action:'rest'});
  objs.push({type:'market', row:VR+1, col:VC+1, label:'Marché — Acheter',     action:'trade'});
  objs.push({type:'fruit',  row:VR-5, col:VC+11,label:'Manguier — Cueillir', action:'eat'});
  objs.push({type:'fruit',  row:VR+6, col:VC-11,label:'Fruits — Cueillir',   action:'eat'});
  objs.push({type:'fish',   row:26,   col:11,   label:'Rivière — Pêcher',     action:'fish'});
  objs.push({type:'herb',   row:22,   col:20,   label:'Plantes — Herbe médi.', action:'herb'});
}

// ─── Trees ─────────────────────────────────────────────────────────
const trees=[];
(function(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    if(map[r][c]===T.FOREST&&noise(r+500,c+500)>.45)
      trees.push({x:c*TS+TS/2+rnd(-8,8),y:r*TS+TS/2+rnd(-8,8),
        r:14+noise(r,c+300)*14,sp:noise(r*2,c*2), type:ri(0,3)});
})();

// ─── Particles ─────────────────────────────────────────────────────
const particles=[];
function addPart(x,y,vx,vy,life,color,size){
  particles.push({x,y,vx,vy,life,maxLife:life,color,size});
}

// ─── NPCs (village) ────────────────────────────────────────────────
const VR=36,VC=38;
const npcs=[
  {x:(VC-4)*TS,y:VR*TS,vx:.4,vy:0,skin:'#8B5E3C',shirt:'#E53935',name:'Villageois',timer:0,dir:1},
  {x:(VC+3)*TS,y:(VR+2)*TS,vx:0,vy:.35,skin:'#7A5230',shirt:'#1565C0',name:'Pêcheur',timer:0,dir:0},
  {x:(VC-2)*TS,y:(VR-4)*TS,vx:-.3,vy:.3,skin:'#9C6B3C',shirt:'#7B1FA2',name:'Guérisseuse',timer:0,dir:1},
  {x:(VC+1)*TS,y:(VR+1)*TS,vx:.25,vy:-.25,skin:'#6B4226',shirt:'#2E7D32',name:'Chasseur',timer:0,dir:3},
];

// ─── Animals ───────────────────────────────────────────────────────
const animals=[
  ...Array.from({length:8},(_,i)=>({type:'lemur',x:rnd(14,46)*TS,y:rnd(8,50)*TS,vx:0,vy:0,sp:1.6,phase:i*.8})),
  ...Array.from({length:3},()=>({type:'fosa',x:rnd(16,44)*TS,y:rnd(16,44)*TS,vx:0,vy:0,sp:3.2,alert:false})),
  {type:'croco',x:11*TS,y:35*TS,vx:.2,vy:0,sp:2.0},
  {type:'croco',x:10*TS,y:50*TS,vx:-.2,vy:.1,sp:2.0},
  {type:'cham', x:22*TS,y:18*TS,vx:0,vy:0,sp:0,hue:120},
  {type:'bird', x:rnd(10,60)*TS,y:rnd(5,55)*TS,vx:1.2,vy:-.3,sp:2.5,phase:0},
  {type:'bird', x:rnd(10,60)*TS,y:rnd(5,55)*TS,vx:-1.0,vy:.2,sp:2.5,phase:1},
];

// ─── Player ────────────────────────────────────────────────────────
const P={x:39*TS,y:37*TS,sp:3.6,hp:100,faim:100,soif:100,fat:18,moving:false,dir:2,frame:0,interCD:0};

// ─── Camera ────────────────────────────────────────────────────────
let camX=P.x-W/2, camY=P.y-H/2;

// ─── Time ──────────────────────────────────────────────────────────
let gt=8*60, day=1, night=false;

// ─── Clouds ────────────────────────────────────────────────────────
const clouds=Array.from({length:8},(_,i)=>({x:rnd(0,WW),y:rnd(20,180),sp:rnd(.2,.5),w:rnd(80,200),h:rnd(40,80)}));

// ─── Input ─────────────────────────────────────────────────────────
const K={};
document.addEventListener('keydown',e=>{K[e.key]=true;e.preventDefault();});
document.addEventListener('keyup',e=>{K[e.key]=false;});
[['bU','up'],['bD','down'],['bL','left'],['bR','right']].forEach(([id,k])=>{
  const el=document.getElementById(id);
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();K[k]=true;},{passive:false}));
  ['touchend','mouseup'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();K[k]=false;},{passive:false}));
});
const bA=document.getElementById('actBtn');
['touchstart','mousedown'].forEach(ev=>bA.addEventListener(ev,e=>{e.preventDefault();K.e=true;},{passive:false}));
['touchend','mouseup'].forEach(ev=>bA.addEventListener(ev,e=>{e.preventDefault();K.e=false;},{passive:false}));

// ─── UI helpers ────────────────────────────────────────────────────
let msgT=0, hintT=0;
function msg(t,dur=4){const el=document.getElementById('msg');el.innerHTML=t;el.style.opacity='1';msgT=dur;}
function hint(t){const el=document.getElementById('hint');el.textContent=t;el.style.opacity='1';hintT=2;}

// ═══════════════════════════════════════════════════════════════════
//  DRAW — TILE
// ═══════════════════════════════════════════════════════════════════
function drawTile(r,c){
  const x=c*TS-camX, y=r*TS-camY, t=map[r][c];
  if(x<-TS||x>W+TS||y<-TS||y>H+TS)return;

  // ── GRASS ──────────────────────────────────────────────────────
  if(t===T.GRASS||t===T.FLOWER){
    const g=ctx.createLinearGradient(x,y,x,y+TS);
    g.addColorStop(0,'#5cb832'); g.addColorStop(1,'#47961e');
    ctx.fillStyle=g; ctx.fillRect(x,y,TS,TS);
    // Variation patches
    if((r*7+c*13)%9<3){ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(x,y,TS,TS);}
    // Grass blades
    ctx.fillStyle='rgba(40,120,10,.4)';
    const seed=r*73+c*31;
    for(let i=0;i<5;i++){
      const bx=(seed*17+i*41)%52+4, bh=6+((seed+i*7)%8);
      ctx.fillRect(x+bx,y+TS-bh,2,bh);
    }
    if(t===T.FLOWER){
      const fc=['#FF5252','#FFEB3B','#E040FB','#FF9800','#00BCD4','#F06292'];
      for(let i=0;i<4;i++){
        const fx=(r*11+c*7+i*17)%50+4,fy=(r*5+c*19+i*11)%40+4;
        ctx.fillStyle=fc[(r*3+c+i*2)%fc.length];
        ctx.beginPath();ctx.arc(x+fx,y+fy,3.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#FFFF00';ctx.beginPath();ctx.arc(x+fx,y+fy,1.2,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // ── FOREST GROUND ───────────────────────────────────────────────
  if(t===T.FOREST){
    const g=ctx.createLinearGradient(x,y,x,y+TS);
    g.addColorStop(0,'#2d6b18');g.addColorStop(1,'#1e4d0d');
    ctx.fillStyle=g;ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='rgba(0,0,0,.1)';
    if((r+c)%2)ctx.fillRect(x,y,TS,TS);
    // Leaf litter
    ctx.fillStyle='rgba(60,120,20,.35)';
    const seed=r*91+c*47;
    for(let i=0;i<3;i++){
      const lx=(seed+i*29)%56+4,ly=(seed+i*13)%44+8;
      ctx.beginPath();ctx.ellipse(x+lx,y+ly,5,3,(seed+i)*.5,0,Math.PI*2);ctx.fill();
    }
  }

  // ── WATER ───────────────────────────────────────────────────────
  if(t===T.WATER){
    const t0=Date.now()*.001;
    const g=ctx.createLinearGradient(x,y,x+TS,y+TS);
    g.addColorStop(0,'#1565C0');g.addColorStop(.5,'#1976D2');g.addColorStop(1,'#0D47A1');
    ctx.fillStyle=g;ctx.fillRect(x,y,TS,TS);
    // Animated ripples
    for(let i=0;i<3;i++){
      const wx=x+(Math.sin(t0*.8+r*.3+c*.2+i*1.5)*.5+.5)*(TS-16)+4;
      const wy=y+i*18+4+(Math.cos(t0*.6+r+c+i))*3;
      const wa=.25+Math.sin(t0*1.2+i*2)*.15;
      ctx.strokeStyle=`rgba(150,210,255,${wa})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.ellipse(wx,wy,14,4,0,0,Math.PI*2);ctx.stroke();
    }
    // Sparkle
    if((r*3+c*7+Math.floor(t0*3))%11===0){
      ctx.fillStyle='rgba(255,255,255,.6)';
      ctx.beginPath();ctx.arc(x+TS/2+Math.sin(t0*2)*10,y+8,2,0,Math.PI*2);ctx.fill();
    }
  }

  // ── SAND ────────────────────────────────────────────────────────
  if(t===T.SAND){
    const g=ctx.createLinearGradient(x,y,x,y+TS);
    g.addColorStop(0,'#f0d060');g.addColorStop(1,'#d4b040');
    ctx.fillStyle=g;ctx.fillRect(x,y,TS,TS);
    ctx.strokeStyle='rgba(180,140,20,.2)';ctx.lineWidth=1;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(x+TS/2,y+8+i*18,TS*.4,4,0,0,Math.PI*2);ctx.stroke();}
  }

  // ── MUD ─────────────────────────────────────────────────────────
  if(t===T.MUD){
    ctx.fillStyle='#6b3d1e';ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='rgba(0,0,0,.1)';
    for(let i=0;i<2;i++){const mx=(r*17+c*11+i*23)%48+4,my=(r*7+c*19+i*13)%44+6;
      ctx.beginPath();ctx.ellipse(x+mx,y+my,8,4,i*.3,0,Math.PI*2);ctx.fill();}
  }

  // ── STONE/PLAZA ─────────────────────────────────────────────────
  if(t===T.STONE){
    ctx.fillStyle=(r+c)%2===0?'#9E9E9E':'#8D8D8D';ctx.fillRect(x,y,TS,TS);
    ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=1;ctx.strokeRect(x,y,TS,TS);
    ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(x+2,y+2,TS-4,TS/2-2);
  }

  // ── ROAD ────────────────────────────────────────────────────────
  if(t===T.ROAD){
    const g=ctx.createLinearGradient(x,y,x,y+TS);
    g.addColorStop(0,'#c4976a');g.addColorStop(1,'#a87a50');
    ctx.fillStyle=g;ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='rgba(0,0,0,.06)';
    if((r+c)%3===0)ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(x+4,y+TS/2,TS-8,2);
  }

  // ── HOUSE ───────────────────────────────────────────────────────
  // (houses drawn separately in drawHouse)
}

// ═══════════════════════════════════════════════════════════════════
//  DRAW — MALAGASY HOUSE (cartoon, detailed)
// ═══════════════════════════════════════════════════════════════════
function drawHouse(obj){
  const x=obj.oc*TS-camX, y=obj.or*TS-camY;
  const w=obj.ow*TS, h=obj.oh*TS;
  const big=obj.style==='malagasy_big';

  // Stilts / foundation
  ctx.fillStyle='#6D4C41';
  ctx.fillRect(x+6,y+h-10,w-12,12);

  // Wall — bamboo/wood planks
  const wallGrad=ctx.createLinearGradient(x,y,x+w,y+h);
  wallGrad.addColorStop(0,'#EFEBE9');wallGrad.addColorStop(.4,'#D7CCC8');wallGrad.addColorStop(1,'#BCAAA4');
  ctx.fillStyle=wallGrad;
  ctx.beginPath();
  ctx.moveTo(x+6,y+h*0.28);ctx.lineTo(x+w-6,y+h*0.28);
  ctx.lineTo(x+w-6,y+h-10);ctx.lineTo(x+6,y+h-10);
  ctx.closePath();ctx.fill();

  // Bamboo lines (wall texture)
  ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;
  for(let i=0;i<w/8;i++){ctx.beginPath();ctx.moveTo(x+6+i*8,y+h*0.28);ctx.lineTo(x+6+i*8,y+h-10);ctx.stroke();}

  // Veranda/porch
  ctx.fillStyle='#A1887F';
  ctx.fillRect(x+10,y+h-16,w-20,10);

  // Windows
  const winColor='rgba(173,216,230,0.85)';
  const winShadow='rgba(100,160,200,0.4)';
  if(big){
    // Two windows
    [[x+12,y+h*0.38],[x+w-28,y+h*0.38]].forEach(([wx,wy])=>{
      // Frame
      ctx.fillStyle='#795548';ctx.fillRect(wx-3,wy-3,22,26);
      // Glass
      ctx.fillStyle=winColor;ctx.fillRect(wx,wy,16,20);
      // Reflection
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(wx+1,wy+1,6,7);
      // Cross
      ctx.fillStyle='#795548';ctx.fillRect(wx+7,wy,2,20);ctx.fillRect(wx,wy+8,16,2);
      // Shutter
      ctx.fillStyle='#5D4037';ctx.fillRect(wx-7,wy,4,20);ctx.fillRect(wx+18,wy,4,20);
    });
    // Door
    const dx=x+w/2-9;
    ctx.fillStyle='#5D4037';ctx.fillRect(dx-2,y+h-30,22,24);
    ctx.fillStyle='#8B4513';ctx.fillRect(dx,y+h-28,18,22);
    ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(dx+1,y+h-27,6,18);
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(dx+15,y+h-16,2.5,0,Math.PI*2);ctx.fill();
  } else {
    // One window
    const wx=x+w/2-10, wy=y+h*0.38;
    ctx.fillStyle='#795548';ctx.fillRect(wx-3,wy-3,26,26);
    ctx.fillStyle=winColor;ctx.fillRect(wx,wy,20,20);
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(wx+1,wy+1,7,7);
    ctx.fillStyle='#795548';ctx.fillRect(wx+9,wy,2,20);ctx.fillRect(wx,wy+8,20,2);
    // Door
    const dx=x+w/2-6;
    ctx.fillStyle='#5D4037';ctx.fillRect(dx-2,y+h-28,18,22);
    ctx.fillStyle='#8B4513';ctx.fillRect(dx,y+h-26,14,20);
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(dx+11,y+h-15,2,0,Math.PI*2);ctx.fill();
  }

  // ── ROOF (Malagasy peaked, cartoon style) ───────────────────────
  const roofH=big?h*0.38:h*0.35;
  const roofTop=y+h*0.28-roofH;

  // Roof shadow underside
  ctx.fillStyle='rgba(0,0,0,.18)';
  ctx.beginPath();
  ctx.moveTo(x+2,y+h*0.28);ctx.lineTo(x+w/2,roofTop+4);ctx.lineTo(x+w-2,y+h*0.28);
  ctx.closePath();ctx.fill();

  // Main roof
  const rg=ctx.createLinearGradient(x,roofTop,x,y+h*0.28);
  rg.addColorStop(0,'#D32F2F');rg.addColorStop(.4,'#E53935');rg.addColorStop(1,'#B71C1C');
  ctx.fillStyle=rg;
  ctx.beginPath();
  ctx.moveTo(x-4,y+h*0.28+2);ctx.lineTo(x+w/2,roofTop);ctx.lineTo(x+w+4,y+h*0.28+2);
  ctx.closePath();ctx.fill();

  // Roof tiles pattern
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=1;
  const roofSlope=roofH/(w/2);
  for(let row=0;row<5;row++){
    const ry=roofTop+row*(roofH/5);
    const rx0=x+w/2-(ry-roofTop)/roofSlope;
    const rx1=x+w/2+(ry-roofTop)/roofSlope;
    ctx.beginPath();ctx.moveTo(rx0,ry);ctx.lineTo(rx1,ry);ctx.stroke();
    const spacing=8+(row*3);
    for(let ci=0;ci<(rx1-rx0)/spacing;ci++){
      ctx.beginPath();ctx.moveTo(rx0+ci*spacing,ry);ctx.lineTo(rx0+ci*spacing+spacing/2,ry+roofH/5);ctx.stroke();
    }
  }

  // Roof ridge
  ctx.strokeStyle='#7f0000';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x+w/2-2,roofTop);ctx.lineTo(x+w/2+2,roofTop);ctx.stroke();

  // Chimney smoke (animated)
  const t0=Date.now()*.001;
  for(let i=0;i<4;i++){
    const sx=x+w*.7, sy=roofTop-10-i*14;
    const sw=4+Math.sin(t0*2+i)*.5*(i+1);
    const sa=.4-i*.08;
    ctx.fillStyle=`rgba(200,200,200,${sa})`;
    ctx.beginPath();ctx.arc(sx+Math.sin(t0+i*.7)*i*3,sy,sw,0,Math.PI*2);ctx.fill();
  }

  // Shadow cast by house
  ctx.fillStyle='rgba(0,0,0,.12)';
  ctx.beginPath();
  ctx.moveTo(x+w,y+h*.7);ctx.lineTo(x+w+h*.3,y+h*.9);
  ctx.lineTo(x+w+h*.3,y+h);ctx.lineTo(x+w,y+h);
  ctx.closePath();ctx.fill();
}

// ═══════════════════════════════════════════════════════════════════
//  DRAW — TREE (cartoon, multi-layer)
// ═══════════════════════════════════════════════════════════════════
function drawTree(tr){
  const sx=tr.x-camX, sy=tr.y-camY, r=tr.r;
  if(sx<-60||sx>W+60||sy<-80||sy>H+60)return;
  const sway=Math.sin(Date.now()*.0008+tr.sp*5)*.8;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath();ctx.ellipse(sx+4,sy+r*.55,r*.95,r*.35,0,0,Math.PI*2);ctx.fill();

  // Trunk
  const tg=ctx.createLinearGradient(sx-3,sy,sx+3,sy+r*.8);
  tg.addColorStop(0,'#6D4C41');tg.addColorStop(1,'#4E342E');
  ctx.fillStyle=tg;
  // Tapered trunk
  ctx.beginPath();
  ctx.moveTo(sx-4+sway*.3,sy+r*.7);ctx.lineTo(sx-2+sway*.5,sy);
  ctx.lineTo(sx+2+sway*.5,sy);ctx.lineTo(sx+4+sway*.3,sy+r*.7);
  ctx.closePath();ctx.fill();
  // Bark detail
  ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(sx,sy+r*.2);ctx.lineTo(sx,sy+r*.65);ctx.stroke();

  // Roots
  ctx.strokeStyle='#4E342E';ctx.lineWidth=2;
  [[-1,1],[0,0],[1,1]].forEach(([rx,_],i)=>{
    ctx.beginPath();ctx.moveTo(sx+sway*.3,sy+r*.65);
    ctx.quadraticCurveTo(sx+rx*8,sy+r*.8,sx+rx*12+(i-1)*4,sy+r*.85);ctx.stroke();
  });

  // Canopy — multiple circles for volume
  const ty=tr.type;
  const colors=ty===0?['#1B5E20','#2E7D32','#388E3C','#43A047']:
                ty===1?['#1A237E','#283593','#1565C0','#1976D2']:
                       ['#1B5E20','#33691E','#558B2F','#7CB342'];

  const layers=[
    {ox:sway*1.2,oy:-r*.3,r:r*.75},
    {ox:-r*.35+sway*.9,oy:-r*.55,r:r*.6},
    {ox:r*.3+sway*.9,oy:-r*.5,r:r*.55},
    {ox:sway*1.0,oy:-r*.75,r:r*.45},
  ];
  layers.forEach((l,i)=>{
    const cg=ctx.createRadialGradient(sx+l.ox-l.r*.25,sy+l.oy-l.r*.25,0,sx+l.ox,sy+l.oy,l.r);
    cg.addColorStop(0,colors[Math.min(i+1,colors.length-1)]);
    cg.addColorStop(1,colors[0]);
    ctx.fillStyle=cg;
    ctx.beginPath();ctx.arc(sx+l.ox,sy+l.oy,l.r,0,Math.PI*2);ctx.fill();
  });
  // Highlight
  ctx.fillStyle='rgba(255,255,255,.07)';
  ctx.beginPath();ctx.arc(sx+sway*.9-r*.2,sy-r*.65,r*.28,0,Math.PI*2);ctx.fill();
  // Leaf particles (wind)
  if(Math.random()<.004){
    addPart(sx+rnd(-r,r),sy-r*.5,rnd(-.5,1.5)*2,rnd(-.5,.5)*2,rnd(1,3),'#43A047',4);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  DRAW — INTERACTIVE OBJECTS
// ═══════════════════════════════════════════════════════════════════
function drawObj(o){
  const sx=o.col*TS-camX+TS/2, sy=o.row*TS-camY+TS/2;
  if(sx<-80||sx>W+80||sy<-80||sy>H+80)return;
  const t0=Date.now()*.001;

  if(o.type==='well'){
    // Base stones
    ctx.fillStyle='#78909C';
    ctx.beginPath();ctx.ellipse(sx,sy+8,22,8,0,0,Math.PI*2);ctx.fill();
    // Wall cylinder
    const wg=ctx.createLinearGradient(sx-18,sy,sx+18,sy);
    wg.addColorStop(0,'#546E7A');wg.addColorStop(.5,'#78909C');wg.addColorStop(1,'#455A64');
    ctx.fillStyle=wg;ctx.fillRect(sx-18,sy-18,36,26);
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.ellipse(sx,sy-18,18,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#90A4AE';ctx.beginPath();ctx.ellipse(sx,sy-18,18,6,0,0,Math.PI);ctx.fill();
    // Posts
    ctx.fillStyle='#5D4037';ctx.fillRect(sx-22,sy-32,5,30);ctx.fillRect(sx+17,sy-32,5,30);
    // Crossbeam
    ctx.fillRect(sx-22,sy-34,44,6);
    // Rope & bucket
    ctx.strokeStyle='#9E9E9E';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(sx,sy-32);ctx.lineTo(sx,sy-20);ctx.stroke();
    ctx.fillStyle='#607D8B';ctx.fillRect(sx-5,sy-22,10,8);
    // Water glint
    ctx.fillStyle='rgba(100,200,255,.6)';
    ctx.beginPath();ctx.ellipse(sx,sy-14,10,3,0,0,Math.PI*2);ctx.fill();
  }

  if(o.type==='fire'){
    // Logs
    ctx.fillStyle='#6D4C41';
    ctx.save();ctx.translate(sx,sy+6);ctx.rotate(.4);ctx.fillRect(-18,-4,36,7);ctx.restore();
    ctx.save();ctx.translate(sx,sy+6);ctx.rotate(-.4);ctx.fillRect(-18,-4,36,7);ctx.restore();
    // Embers
    ctx.fillStyle='#FF5722';ctx.beginPath();ctx.arc(sx,sy+4,10,0,Math.PI*2);ctx.fill();
    // Fire layers
    [[0,0,14,24,'#FF6F00'],[0,-4,10,18,'#FF9800'],[0,-8,7,14,'#FFC107'],[0,-12,4,10,'#FFEE58']].forEach(([fx,fy,fw,fh,fc])=>{
      const flick=Math.sin(t0*8+fx)*3;
      ctx.fillStyle=fc;
      ctx.beginPath();
      ctx.moveTo(sx+fx-fw/2,sy+fy+fh/2);
      ctx.quadraticCurveTo(sx+fx-fw/3+flick,sy+fy,sx+fx+flick*.5,sy+fy-fh/2);
      ctx.quadraticCurveTo(sx+fx+fw/3-flick,sy+fy,sx+fx+fw/2,sy+fy+fh/2);
      ctx.closePath();ctx.fill();
    });
    // Glow
    const gl=ctx.createRadialGradient(sx,sy,0,sx,sy,40);
    gl.addColorStop(0,'rgba(255,180,0,.3)');gl.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=gl;ctx.beginPath();ctx.arc(sx,sy,40,0,Math.PI*2);ctx.fill();
    // Sparks
    if(Math.random()<.15)addPart(sx+rnd(-4,4),sy,rnd(-1,1),rnd(-3,-1),rnd(.3,.8),'#FF6F00',2);
  }

  if(o.type==='market'){
    // Canopy
    const cg=ctx.createLinearGradient(sx-35,sy-28,sx+35,sy-8);
    cg.addColorStop(0,'#E53935');cg.addColorStop(.5,'#FFEE58');cg.addColorStop(1,'#E53935');
    ctx.fillStyle=cg;
    ctx.beginPath();ctx.moveTo(sx-38,sy-8);ctx.lineTo(sx+38,sy-8);ctx.lineTo(sx+32,sy-32);ctx.lineTo(sx-32,sy-32);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#B71C1C';ctx.lineWidth=2;ctx.stroke();
    // Fringe
    ctx.strokeStyle='#FFEE58';ctx.lineWidth=3;
    for(let i=0;i<8;i++){const fx=sx-34+i*10;ctx.beginPath();ctx.moveTo(fx,sy-8);ctx.lineTo(fx+2,sy+2);ctx.stroke();}
    // Table
    ctx.fillStyle='#8D6E63';ctx.fillRect(sx-30,sy-6,60,16);
    ctx.fillStyle='#A1887F';ctx.fillRect(sx-28,sy-8,56,6);
    // Goods
    ['#E53935','#FF9800','#FFEE58','#4CAF50','#9C27B0'].forEach((c,i)=>{
      ctx.fillStyle=c;ctx.beginPath();ctx.arc(sx-20+i*12,sy-2,5,0,Math.PI*2);ctx.fill();
    });
    // Posts
    ctx.fillStyle='#6D4C41';ctx.fillRect(sx-34,sy-32,4,40);ctx.fillRect(sx+30,sy-32,4,40);
  }

  if(o.type==='fruit'){
    // Trunk
    const tg=ctx.createLinearGradient(sx-3,sy,sx+3,sy+28);tg.addColorStop(0,'#6D4C41');tg.addColorStop(1,'#4E342E');
    ctx.fillStyle=tg;ctx.beginPath();ctx.moveTo(sx-4,sy+28);ctx.lineTo(sx-2,sy);ctx.lineTo(sx+2,sy);ctx.lineTo(sx+4,sy+28);ctx.closePath();ctx.fill();
    // Leaves (3 clusters)
    [[-8,-8],[8,-12],[0,-20]].forEach(([ox,oy])=>{
      const lg=ctx.createRadialGradient(sx+ox-4,sy+oy-4,0,sx+ox,sy+oy,18);
      lg.addColorStop(0,'#43A047');lg.addColorStop(1,'#1B5E20');
      ctx.fillStyle=lg;ctx.beginPath();ctx.arc(sx+ox,sy+oy,18,0,Math.PI*2);ctx.fill();
    });
    // Mangoes
    [[-12,-4],[0,-6],[12,-4],[-6,-14],[8,-16]].forEach(([fx,fy])=>{
      ctx.fillStyle='#FF8F00';ctx.beginPath();ctx.ellipse(sx+fx,sy+fy,6,7,.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#FFD54F';ctx.beginPath();ctx.arc(sx+fx-1,sy+fy-2,2,0,Math.PI*2);ctx.fill();
    });
  }

  if(o.type==='fish'){
    // Dock
    ctx.fillStyle='#795548';ctx.fillRect(sx-20,sy,40,8);
    ctx.fillStyle='#6D4C41';ctx.fillRect(sx-22,sy-2,44,4);
    // Dock posts
    ctx.fillStyle='#5D4037';[sx-16,sx,sx+16].forEach(px=>{ctx.fillRect(px-2,sy,4,20);});
    // Rod
    ctx.strokeStyle='#8D6E63';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(sx-14,sy-2);ctx.lineTo(sx+18,sy-28);ctx.stroke();
    ctx.strokeStyle='#9E9E9E';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx+18,sy-28);ctx.lineTo(sx+24,sy-4+Math.sin(t0*2)*4);ctx.stroke();
    // Fish
    ctx.fillStyle='#42A5F5';
    ctx.beginPath();ctx.ellipse(sx+22,sy-2+Math.sin(t0*2)*4,8,4,.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(sx+25,sy-4+Math.sin(t0*2)*4,2,0,Math.PI*2);ctx.fill();
  }

  if(o.type==='herb'){
    // Small herb garden
    ctx.fillStyle='#2E7D32';ctx.beginPath();ctx.arc(sx,sy,22,0,Math.PI*2);ctx.fill();
    [[-14,-6],[0,-12],[14,-6],[-8,6],[8,6],[0,0]].forEach(([hx,hy])=>{
      ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.arc(sx+hx,sy+hy,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#81C784';ctx.beginPath();ctx.arc(sx+hx-2,sy+hy-2,3,0,Math.PI*2);ctx.fill();
    });
    // Flowers
    ['#E040FB','#FFEB3B','#F48FB1'].forEach((c,i)=>{
      ctx.fillStyle=c;ctx.beginPath();ctx.arc(sx-10+i*10,sy-4,4,0,Math.PI*2);ctx.fill();
    });
  }

  // Label (near)
  const pr=Math.floor(P.y/TS), pc=Math.floor(P.x/TS);
  if(Math.abs(o.row-pr)<=2&&Math.abs(o.col-pc)<=2){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(sx-42,sy+28,84,18);
    ctx.fillStyle='#5fff7a';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText('[E] '+o.label,sx,sy+41);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  DRAW — ANIMALS
// ═══════════════════════════════════════════════════════════════════
function drawAnimal(a){
  const sx=a.x-camX, sy=a.y-camY;
  if(sx<-60||sx>W+60||sy<-60||sy>H+60)return;
  const t0=Date.now()*.001+a.phase||0;
  const mv=Math.sqrt((a.vx||0)**2+(a.vy||0)**2)>.1;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath();ctx.ellipse(sx+2,sy+12,10,3.5,0,0,Math.PI*2);ctx.fill();

  if(a.type==='lemur'){
    const bob=mv?Math.sin(t0*8)*3:0;
    // Tail (striped, long)
    ctx.save();ctx.translate(sx,sy+8);
    const ta=mv?Math.sin(t0*6)*.4:.3;
    ctx.rotate(ta);
    ctx.strokeStyle='#757575';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(18,12,22,-2);ctx.stroke();
    // Stripes on tail
    ctx.strokeStyle='#212121';ctx.lineWidth=2;
    for(let i=0;i<4;i++){
      const tp=i/4;
      const tx=tp*18*(1-tp*.5),ty=tp*12*(1-tp*.8)-tp*tp*8;
      ctx.beginPath();ctx.moveTo(tx-2,ty-2);ctx.lineTo(tx+3,ty+2);ctx.stroke();
    }
    ctx.restore();

    // Body
    const bg=ctx.createRadialGradient(sx-2,sy-2,0,sx,sy,10);
    bg.addColorStop(0,'#B0BEC5');bg.addColorStop(1,'#78909C');
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(sx,sy+bob,8,10,0,0,Math.PI*2);ctx.fill();
    // White belly
    ctx.fillStyle='#ECEFF1';ctx.beginPath();ctx.ellipse(sx,sy+2+bob,4.5,7,0,0,Math.PI*2);ctx.fill();

    // Legs (animated)
    ctx.fillStyle='#78909C';
    if(mv){
      ctx.fillRect(sx-6,sy+9+bob,4,8+Math.sin(t0*8)*4);
      ctx.fillRect(sx+2,sy+9+bob,4,8-Math.sin(t0*8)*4);
    }else{ctx.fillRect(sx-6,sy+9,9,6);}

    // Head
    const hg=ctx.createRadialGradient(sx-1,sy-13,0,sx,sy-12,9);
    hg.addColorStop(0,'#B0BEC5');hg.addColorStop(1,'#78909C');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(sx,sy-12+bob,9,0,Math.PI*2);ctx.fill();

    // Black & white face
    ctx.fillStyle='#212121';
    ctx.beginPath();ctx.arc(sx,sy-10+bob,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#F5F5F5';
    ctx.beginPath();ctx.arc(sx-4,sy-14+bob,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+4,sy-14+bob,4,0,Math.PI*2);ctx.fill();

    // Eyes (bright yellow)
    ctx.fillStyle='#FFEE58';
    ctx.beginPath();ctx.arc(sx-4,sy-15+bob,3.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+4,sy-15+bob,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#212121';
    ctx.beginPath();ctx.arc(sx-4,sy-15+bob,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+4,sy-15+bob,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.beginPath();ctx.arc(sx-3,sy-16+bob,1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+5,sy-16+bob,1,0,Math.PI*2);ctx.fill();

    // Ears
    ctx.fillStyle='#90A4AE';
    ctx.beginPath();ctx.arc(sx-8,sy-20+bob,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+8,sy-20+bob,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFCDD2';
    ctx.beginPath();ctx.arc(sx-8,sy-20+bob,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+8,sy-20+bob,2.5,0,Math.PI*2);ctx.fill();
  }

  if(a.type==='fosa'){
    if(!night&&!a.alert)return;
    ctx.globalAlpha=night?1:.35;

    const bob=mv?Math.sin(t0*10)*2:0;
    // Body — low, sleek, feline
    const bg=ctx.createRadialGradient(sx,sy,0,sx,sy,14);
    bg.addColorStop(0,'#AD1457');bg.addColorStop(1,'#880E4F');
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(sx,sy+bob,10,14,0,0,Math.PI*2);ctx.fill();

    // Head
    const hg=ctx.createRadialGradient(sx,sy-17,0,sx,sy-16,10);
    hg.addColorStop(0,'#C2185B');hg.addColorStop(1,'#AD1457');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(sx,sy-16+bob,10,0,Math.PI*2);ctx.fill();

    // Ears (sharp)
    ctx.fillStyle='#880E4F';
    [[sx-10,sy-24],[sx+10,sy-24]].forEach(([ex,ey])=>{
      ctx.beginPath();ctx.moveTo(ex-5,ey+4);ctx.lineTo(ex,ey-8);ctx.lineTo(ex+5,ey+4);ctx.closePath();ctx.fill();
      ctx.fillStyle='#E91E63';ctx.beginPath();ctx.moveTo(ex-3,ey+3);ctx.lineTo(ex,ey-4);ctx.lineTo(ex+3,ey+3);ctx.closePath();ctx.fill();
      ctx.fillStyle='#880E4F';
    });

    // Glowing eyes
    ctx.shadowColor='#FFEE58';ctx.shadowBlur=12;
    ctx.fillStyle='#FFEE58';
    ctx.beginPath();ctx.arc(sx-4,sy-17+bob,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+4,sy-17+bob,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#212121';
    ctx.beginPath();ctx.arc(sx-4,sy-17+bob,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+4,sy-17+bob,2,0,Math.PI*2);ctx.fill();

    // Tail
    ctx.strokeStyle='#880E4F';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(sx,sy+14+bob);ctx.quadraticCurveTo(sx+20,sy+20+Math.sin(t0*4)*4,sx+18,sy+4+bob);ctx.stroke();

    // Legs
    ctx.fillStyle='#AD1457';
    if(mv){
      ctx.fillRect(sx-9,sy+8+bob,5,12+Math.sin(t0*10)*5);
      ctx.fillRect(sx+4,sy+8+bob,5,12-Math.sin(t0*10)*5);
    }

    // Alert glow
    if(a.alert){
      ctx.strokeStyle='rgba(255,50,50,.4)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(sx,sy,40,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='rgba(255,50,50,.15)';ctx.lineWidth=8;
      ctx.beginPath();ctx.arc(sx,sy,50,0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  if(a.type==='croco'){
    ctx.save();ctx.translate(sx,sy);
    const ang=Math.atan2(a.vy||0,(a.vx||.001));
    ctx.rotate(ang);

    // Shadow
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(0,2,24,7,0,0,Math.PI*2);ctx.fill();

    // Body scales (detailed)
    const bg=ctx.createLinearGradient(-24,0,24,0);
    bg.addColorStop(0,'#1B5E20');bg.addColorStop(.5,'#2E7D32');bg.addColorStop(1,'#1B5E20');
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,24,9,0,0,Math.PI*2);ctx.fill();

    // Scale pattern
    ctx.fillStyle='#33691E';
    for(let i=-3;i<=3;i++){ctx.beginPath();ctx.ellipse(i*7,0,5,4,0,0,Math.PI*2);ctx.fill();}
    // Ridge
    ctx.fillStyle='#1B5E20';
    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*8,-9);ctx.lineTo(i*8-3,-5);ctx.lineTo(i*8+3,-5);ctx.closePath();ctx.fill();}

    // Tail (tapered)
    ctx.fillStyle='#2E7D32';
    ctx.beginPath();ctx.moveTo(-24,-4);ctx.lineTo(-42,0);ctx.lineTo(-24,4);ctx.closePath();ctx.fill();

    // Head / snout
    const hg=ctx.createLinearGradient(20,-6,34,6);
    hg.addColorStop(0,'#2E7D32');hg.addColorStop(1,'#1B5E20');
    ctx.fillStyle=hg;ctx.beginPath();ctx.ellipse(26,0,14,6,0,0,Math.PI*2);ctx.fill();

    // Teeth
    ctx.fillStyle='#FFF5F5';
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(20+i*4,-6);ctx.lineTo(18+i*4,-2);ctx.lineTo(22+i*4,-2);ctx.closePath();ctx.fill();}

    // Eyes on top (protruding)
    [[-4,-7],[4,-7]].forEach(([ex,ey])=>{
      ctx.fillStyle='#33691E';ctx.beginPath();ctx.arc(22+ex,ey,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#FFEE58';ctx.beginPath();ctx.arc(22+ex,ey,3.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#212121';ctx.beginPath();ctx.ellipse(22+ex,ey,1.5,2.5,0,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();
  }

  if(a.type==='cham'){
    a.hue=(a.hue||120)+(Math.sin(t0*.5)*.3);
    ctx.save();ctx.translate(sx,sy);
    // Branch
    ctx.strokeStyle='#5D4037';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(-24,0);ctx.lineTo(28,0);ctx.stroke();
    // Body
    ctx.fillStyle=`hsl(${a.hue},80%,35%)`;
    ctx.beginPath();ctx.ellipse(0,-4,14,8,0,0,Math.PI*2);ctx.fill();
    // Crest
    ctx.fillStyle=`hsl(${a.hue+40},70%,50%)`;
    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*5,-12);ctx.lineTo(i*5-3,-8);ctx.lineTo(i*5+3,-8);ctx.closePath();ctx.fill();}
    // Head
    ctx.fillStyle=`hsl(${a.hue+20},75%,40%)`;ctx.beginPath();ctx.ellipse(16,-4,10,7,.2,0,Math.PI*2);ctx.fill();
    // Eye
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(20,-6,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(21,-6,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(21.5,-6.5,1,0,Math.PI*2);ctx.fill();
    // Curly tail
    ctx.strokeStyle=`hsl(${a.hue+60},65%,30%)`;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-14,-2);ctx.quadraticCurveTo(-22,6,-18,14);ctx.stroke();
    // Feet on branch
    ctx.strokeStyle=`hsl(${a.hue},70%,30%)`;ctx.lineWidth=2;
    [[-8,2],[4,2]].forEach(([fx,fy])=>{ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx-3,6);ctx.moveTo(fx,fy);ctx.lineTo(fx+3,6);ctx.stroke();});
    ctx.restore();
  }

  if(a.type==='bird'){
    const flyY=Math.sin(t0*3+a.phase)*6;
    const flapAngle=Math.sin(t0*12)*0.6;
    ctx.save();ctx.translate(sx,sy+flyY);
    // Wings
    ctx.fillStyle='#FFF9C4';
    ctx.save();ctx.rotate(-flapAngle);ctx.beginPath();ctx.ellipse(-10,-2,12,4,-0.3,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.save();ctx.rotate(flapAngle);ctx.beginPath();ctx.ellipse(10,-2,12,4,0.3,0,Math.PI*2);ctx.fill();ctx.restore();
    // Body
    ctx.fillStyle='#F9A825';ctx.beginPath();ctx.ellipse(0,0,6,4,0,0,Math.PI*2);ctx.fill();
    // Head
    ctx.fillStyle='#F57F17';ctx.beginPath();ctx.arc(7,0,4,0,Math.PI*2);ctx.fill();
    // Beak
    ctx.fillStyle='#FF8F00';ctx.beginPath();ctx.moveTo(10,-1);ctx.lineTo(15,0);ctx.lineTo(10,1);ctx.closePath();ctx.fill();
    // Eye
    ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(8,-1,1.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Move birds
    a.x+=a.vx*1.5;a.y+=a.vy*.5;
    if(a.x>WW||a.x<0){a.vx*=-1;}if(a.y>WH||a.y<0){a.vy*=-1;}
  }
}

//  DRAW — NPC
// ═══════════════════════════════════════════════════════════════════
function drawNPC(n){
  const sx=n.x-camX, sy=n.y-camY;
  if(sx<-40||sx>W+40||sy<-40||sy>H+40)return;
  const t0=Date.now()*.001;
  const mv=Math.abs(n.vx)>.1||Math.abs(n.vy)>.1;
  const bob=mv?Math.sin(t0*8)*2.5:0;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(sx+1,sy+18,8,3,0,0,Math.PI*2);ctx.fill();
  // Shoes
  ctx.fillStyle='#4E342E';
  if(mv){ctx.fillRect(sx-7,sy+14+(Math.sin(t0*8)>0?2:0),6,5);ctx.fillRect(sx+1,sy+14+(Math.sin(t0*8)>0?0:2),6,5);}
  else{ctx.fillRect(sx-7,sy+14,13,5);}
  // Pants
  ctx.fillStyle='#37474F';
  if(mv){ctx.fillRect(sx-6,sy+4+bob,5,12+Math.sin(t0*8)*4);ctx.fillRect(sx+1,sy+4+bob,5,12-Math.sin(t0*8)*4);}
  else{ctx.fillRect(sx-6,sy+4,12,12);}
  // Shirt
  const sg=ctx.createLinearGradient(sx-8,sy-10,sx+8,sy+4);
  sg.addColorStop(0,n.shirt+'CC');sg.addColorStop(1,n.shirt);
  ctx.fillStyle=sg;ctx.fillRect(sx-8,sy-10,16,15);
  // Belt
  ctx.fillStyle='#5D4037';ctx.fillRect(sx-8,sy+3,16,3);ctx.fillStyle='#FFD700';ctx.fillRect(sx-2,sy+3,4,3);
  // Arms
  ctx.fillStyle=n.skin;
  if(mv){ctx.fillRect(sx-14,sy-8+(Math.sin(t0*8)>0?3:-3),5,14);ctx.fillRect(sx+9,sy-8+(Math.sin(t0*8)>0?-3:3),5,14);}
  else{ctx.fillRect(sx-14,sy-8,5,14);ctx.fillRect(sx+9,sy-8,5,14);}
  // Neck
  ctx.fillStyle=n.skin;ctx.fillRect(sx-3,sy-14,6,6);
  // Head
  const ng=ctx.createRadialGradient(sx-2,sy-22,0,sx,sy-20,12);
  ng.addColorStop(0,n.skin+'EE');ng.addColorStop(1,n.skin);
  ctx.fillStyle=ng;ctx.beginPath();ctx.arc(sx,sy-20+bob,11,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(sx,sy-26+bob,9,Math.PI,0);ctx.fill();
  ctx.fillRect(sx-11,sy-24+bob,4,8);ctx.fillRect(sx+7,sy-24+bob,4,8);
  // Face
  ctx.fillStyle='#212121';
  ctx.beginPath();ctx.arc(sx-4,sy-21+bob,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+4,sy-21+bob,1.8,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#212121';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(sx,sy-17+bob,3,.2,Math.PI-.2);ctx.stroke();
  // Name
  if(d2(n.y,n.x,P.y,P.x)<120){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(sx-28,sy-42+bob,56,14);
    ctx.fillStyle='#FFD700';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
    ctx.fillText(n.name,sx,sy-31+bob);
  }
}

//  DRAW — PLAYER
// ═══════════════════════════════════════════════════════════════════
function drawPlayer(){
  const sx=W/2, sy=H/2;
  const t0=Date.now()*.001;
  const bob=P.moving?Math.sin(t0*10)*3:0;
  const step=Math.sin(t0*10)>0;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(sx+2,sy+22,13,5,0,0,Math.PI*2);ctx.fill();

  // Shoes
  ctx.fillStyle='#3E2723';
  if(P.moving){
    ctx.beginPath();ctx.ellipse(sx-6,sy+21+(step?2:0),7,4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(sx+6,sy+21+(step?0:2),7,4,0,0,Math.PI*2);ctx.fill();
  }else{
    ctx.beginPath();ctx.ellipse(sx,sy+21,13,4,0,0,Math.PI*2);ctx.fill();
  }

  // Pants
  ctx.fillStyle='#1565C0';
  if(P.moving){
    ctx.fillRect(sx-8,sy+4+(step?-3:0)+bob,7,18+(step?4:0));
    ctx.fillRect(sx+1,sy+4+(step?0:-3)+bob,7,18+(step?0:4));
  }else ctx.fillRect(sx-8,sy+4,16,16);

  // Belt
  ctx.fillStyle='#5D4037';ctx.fillRect(sx-9,sy+3,18,4);
  ctx.fillStyle='#FFD700';ctx.fillRect(sx-3,sy+3,6,4);

  // Shirt (lamba Malagasy style — red/white)
  const sg=ctx.createLinearGradient(sx-10,sy-12,sx+10,sy+4);
  sg.addColorStop(0,'#E53935');sg.addColorStop(1,'#C62828');
  ctx.fillStyle=sg;ctx.fillRect(sx-10,sy-12,20,17);
  // White pattern
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(sx-2,sy-12,4,17);
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(sx-9,sy-5,18,2);

  // Backpack
  const bg2=ctx.createLinearGradient(sx+6,sy-10,sx+14,sy+4);
  bg2.addColorStop(0,'#A1887F');bg2.addColorStop(1,'#795548');
  ctx.fillStyle=bg2;ctx.fillRect(sx+6,sy-10,10,16);
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(sx+7,sy-5,8,8);
  // Straps
  ctx.strokeStyle='#8D6E63';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(sx+6,sy-10);ctx.lineTo(sx+2,sy+4);ctx.stroke();

  // Arms
  ctx.fillStyle='#FFCC80';
  if(P.moving){
    ctx.fillRect(sx-16,sy-10+(step?4:-4),6,16);
    ctx.fillRect(sx+10,sy-10+(step?-4:4),6,16);
  }else{
    ctx.fillRect(sx-16,sy-10,6,16);ctx.fillRect(sx+10,sy-10,6,16);
  }

  // Neck
  ctx.fillStyle='#FFCC80';ctx.fillRect(sx-4,sy-16,8,7);

  // Head
  const hg=ctx.createRadialGradient(sx-3,sy-26,0,sx,sy-24,14);
  hg.addColorStop(0,'#FFD180');hg.addColorStop(1,'#FFCC80');
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(sx,sy-24+bob,13,0,Math.PI*2);ctx.fill();

  // Hair (dark, voluminous)
  ctx.fillStyle='#1A1A1A';
  ctx.beginPath();ctx.arc(sx,sy-30+bob,11,Math.PI,.1);ctx.fill();
  ctx.fillRect(sx-14,sy-28+bob,5,10);ctx.fillRect(sx+9,sy-28+bob,5,10);

  // Ears
  ctx.fillStyle='#FFCC80';
  ctx.beginPath();ctx.arc(sx-13,sy-24+bob,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+13,sy-24+bob,5,0,Math.PI*2);ctx.fill();

  // Face
  ctx.fillStyle='#212121';
  ctx.beginPath();ctx.arc(sx-4,sy-25+bob,2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+4,sy-25+bob,2.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.8)';
  ctx.beginPath();ctx.arc(sx-3,sy-26+bob,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+5,sy-26+bob,1,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#5D4037';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(sx,sy-20+bob,4,.2,Math.PI-.2);ctx.stroke();
}

// ═══════════════════════════════════════════════════════════════════
//  DRAW — PARTICLES & CLOUDS
// ═══════════════════════════════════════════════════════════════════
function drawClouds(){
  clouds.forEach(cl=>{
    cl.x+=cl.sp;if(cl.x>WW+cl.w)cl.x=-cl.w;
    const sx=cl.x-camX, sy=cl.y;
    if(sx<-cl.w-20||sx>W+40)return;
    const cg=ctx.createRadialGradient(sx+cl.w/2,sy+cl.h/2,0,sx+cl.w/2,sy+cl.h/2,cl.w/2);
    cg.addColorStop(0,'rgba(255,255,255,.92)');cg.addColorStop(1,'rgba(240,248,255,.7)');
    ctx.fillStyle=cg;
    [0,cl.w*.25,cl.w*.5,cl.w*.75,cl.w].forEach((ox,i)=>{
      ctx.beginPath();ctx.arc(sx+ox,sy+[cl.h*.5,cl.h*.3,cl.h*.2,cl.h*.35,cl.h*.5][i],
        cl.h*[.45,.55,.65,.5,.4][i],0,Math.PI*2);ctx.fill();
    });
    ctx.fillStyle='rgba(230,240,255,.7)';ctx.fillRect(sx,sy+cl.h*.5,cl.w,cl.h*.5);
  });
}

const MM_COL={[T.GRASS]:'#4CAF50',[T.FOREST]:'#1B5E20',[T.WATER]:'#1565C0',[T.SAND]:'#FDD835',
  [T.HOUSE]:'#795548',[T.ROAD]:'#A1887F',[T.FLOWER]:'#81C784',[T.BUSH]:'#388E3C',[T.MUD]:'#6b3d1e',[T.STONE]:'#9E9E9E'};
const MS=92/(COLS*TS);
let mmDirty=true, mmCache=null;
function drawMinimap(){
  if(mmDirty){
    mmCache=document.createElement('canvas');mmCache.width=92;mmCache.height=92;
    const mc2=mmCache.getContext('2d');
    mc2.fillStyle='#111';mc2.fillRect(0,0,92,92);
    for(let r=0;r<ROWS;r+=2)for(let c=0;c<COLS;c+=2){
      mc2.fillStyle=MM_COL[map[r][c]]||'#4CAF50';mc2.fillRect(c*TS*MS,r*TS*MS,2,2);
    }
    mmDirty=false;
  }
  mctx.drawImage(mmCache,0,0);
  // Fosa dots
  if(night)animals.filter(a=>a.type==='fosa').forEach(a=>{
    mctx.fillStyle='#f44336';mctx.beginPath();mctx.arc(a.x*MS,a.y*MS,2.5,0,Math.PI*2);mctx.fill();
  });
  // Player
  mctx.fillStyle='#FFEE58';mctx.beginPath();mctx.arc(P.x*MS,P.y*MS,3.5,0,Math.PI*2);mctx.fill();
  mctx.strokeStyle='#000';mctx.lineWidth=1;mctx.stroke();
}

let curZone='';
function getZone(){
  const pc=Math.floor(P.x/TS),pr=Math.floor(P.y/TS);
  if(map[pr]&&map[pr][pc]===T.WATER)return'🐊 Rivière — DANGER KROKODILY!';
  if(d2(pr,pc,VR,VC)<9)return'🏠 Village Malgache';
  if(d2(pr,pc,25,28)<22&&map[pr]&&map[pr][pc]===T.FOREST)return'🌿 Forêt Tropicale';
  if(pr>55)return'🌾 Savane du Sud';
  return'🌴 Forêt Tropicale';
}

// ═══════════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════════
let lt=0, nearObj=null, interCD=0;
function update(dt){
  // Move
  let dx=0,dy=0;
  if(K.ArrowUp||K.up||K.z||K.Z)dy=-1;
  if(K.ArrowDown||K.down||K.s||K.S)dy=1;
  if(K.ArrowLeft||K.left||K.q||K.Q)dx=-1;
  if(K.ArrowRight||K.right||K.d||K.D)dx=1;
  P.moving=dx!==0||dy!==0;
  if(P.moving){
    const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;
    const nx=P.x+dx*P.sp, ny=P.y+dy*P.sp;
    const nr=Math.floor(ny/TS),nc=Math.floor(nx/TS);
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&WK.has(map[nr][nc])){
      P.x=Math.max(0,Math.min(WW-1,nx));P.y=Math.max(0,Math.min(WH-1,ny));
    }
  }

  // Camera
  camX+=(P.x-W/2-camX)*.1;camY+=(P.y-H/2-camY)*.1;
  camX=Math.max(0,Math.min(WW-W,camX));camY=Math.max(0,Math.min(WH-H,camY));

  // Time
  gt+=dt*90;if(gt>=24*60){gt-=24*60;day++;}
  const pn=night;night=gt>19*60||gt<6*60;
  if(!pn&&night)msg('🌙 La nuit tombe...<br>Le <b>Fosa</b> s\'éveille dans la forêt !<br>Restez près du feu !',5);
  if(pn&&!night)msg(`☀️ Aube du Jour ${day} !<br>Bonne chance pour votre survie.`,4);
  document.getElementById('night').style.opacity=night?'1':'0';

  // Stats
  P.faim=Math.max(0,P.faim-dt*1.1);
  P.soif=Math.max(0,P.soif-dt*1.6);
  if(P.faim<15||P.soif<15)P.hp=Math.max(0,P.hp-dt*2.5);
  else if(P.faim>60&&P.soif>60)P.hp=Math.min(100,P.hp+dt*.7);
  P.fat=Math.min(100,P.fat+dt*(P.moving?.9:.2));

  // Animals
  animals.forEach(a=>{
    if(a.type==='bird')return;
    if(a.type==='cham')return;
    if(a.type==='lemur'){
      const dd=d2(a.y,a.x,P.y,P.x);
      if(dd<180){const ag=Math.atan2(a.y-P.y,a.x-P.x);a.vx=Math.cos(ag)*a.sp;a.vy=Math.sin(ag)*a.sp;}
      else if(Math.random()<.012){a.vx=(Math.random()-.5)*a.sp;a.vy=(Math.random()-.5)*a.sp;}
      a.x=Math.max(TS,Math.min(WW-TS,a.x+a.vx));a.y=Math.max(TS,Math.min(WH-TS,a.y+a.vy));
    }
    if(a.type==='fosa'){
      if(!night){a.vx=0;a.vy=0;a.alert=false;return;}
      const dd=d2(a.y,a.x,P.y,P.x);
      if(dd<340){a.alert=true;const ag=Math.atan2(P.y-a.y,P.x-a.x);a.vx=Math.cos(ag)*a.sp;a.vy=Math.sin(ag)*a.sp;
        if(dd<90){P.hp=Math.max(0,P.hp-dt*14);if(Math.random()<.04){msg('🔴 <b>Attaque du Fosa!</b><br>Fuyez ou allumez un feu !',2);
          for(let i=0;i<5;i++)addPart(P.x,P.y,rnd(-3,3),rnd(-3,3),.5,'#E53935',4);}}}
      else{a.alert=false;if(Math.random()<.007){a.vx=(Math.random()-.5)*a.sp;a.vy=(Math.random()-.5)*a.sp;}}
      a.x=Math.max(TS,Math.min(WW-TS,a.x+a.vx));a.y=Math.max(TS,Math.min(WH-TS,a.y+a.vy));
    }
    if(a.type==='croco'){
      const dd=d2(a.y,a.x,P.y,P.x);
      if(dd<200){const ag=Math.atan2(P.y-a.y,P.x-a.x);a.vx=Math.cos(ag)*a.sp*.75;a.vy=Math.sin(ag)*a.sp*.75;
        if(dd<70){P.hp=Math.max(0,P.hp-dt*28);if(Math.random()<.05){msg('🐊 <b>KROKODILY!</b><br>Danger mortel — Éloignez-vous !',2);
          for(let i=0;i<8;i++)addPart(P.x,P.y,rnd(-4,4),rnd(-4,4),.6,'#1565C0',5);}}}
      else{if(Math.random()<.01){a.vx=(Math.random()-.5)*a.sp*.5;a.vy=(Math.random()-.5)*a.sp*.5;}}
      a.x=Math.max(TS,Math.min(WW-TS,a.x+a.vx));a.y=Math.max(TS,Math.min(WH-TS,a.y+a.vy));
    }
  });

  // NPCs wander
  npcs.forEach(n=>{
    n.timer+=dt;
    if(n.timer>3){n.timer=0;n.vx=(Math.random()-.5)*1.2;n.vy=(Math.random()-.5)*1.2;}
    n.x=Math.max((VC-12)*TS,Math.min((VC+12)*TS,n.x+n.vx));
    n.y=Math.max((VR-12)*TS,Math.min((VR+12)*TS,n.y+n.vy));
    const nc=Math.floor(n.x/TS),nr=Math.floor(n.y/TS);
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!WK.has(map[nr][nc])){n.vx*=-1;n.vy*=-1;}
  });

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }

  // Interact nearby
  const pr2=Math.floor(P.y/TS),pc2=Math.floor(P.x/TS);
  nearObj=null;
  for(const o of objs){if(o.type==='house')continue;if(Math.abs(o.row-pr2)<=2&&Math.abs(o.col-pc2)<=2){nearObj=o;break;}}
  if(nearObj){hint('🖐 '+nearObj.label);}
  else if(map[pr2]&&map[pr2][pc2]===T.WATER){hint('💧 [E] Boire la rivière (risqué)');}
  else{document.getElementById('hint').style.opacity='0';}

  // E key
  interCD=Math.max(0,interCD-dt);
  if((K.e||K.E)&&interCD<=0){
    K.e=K.E=false;interCD=1;
    if(nearObj){
      if(nearObj.action==='drink'){P.soif=Math.min(100,P.soif+45);msg('💧 Eau fraîche du puits !<br>+45 Soif',2);}
      if(nearObj.action==='eat'){P.faim=Math.min(100,P.faim+40);msg('🥭 Mangues délicieuses !<br>+40 Faim',2);}
      if(nearObj.action==='rest'){P.fat=Math.max(0,P.fat-60);P.hp=Math.min(100,P.hp+15);msg('🔥 Vous vous reposez au feu.<br>-60 Fatigue, +15 HP',3);}
      if(nearObj.action==='trade'){msg('🛒 Marché :<br>Silex, Liane, Herbe médicinale disponibles !',3);}
      if(nearObj.action==='fish'){P.faim=Math.min(100,P.faim+35);msg('🎣 Tilapia pêché !<br>+35 Faim',2);}
      if(nearObj.action==='herb'){msg('🌿 Herbes médicinales récoltées !<br>Utile pour soigner les maladies.',3);}
    }else if(map[pr2]&&map[pr2][pc2]===T.WATER){
      P.soif=Math.min(100,P.soif+20);P.hp=Math.max(0,P.hp-8);
      msg('⚠️ Eau de rivière bue.<br>+20 Soif, -8 HP (non purifiée !)',3);
    }
  }

  // Zone
  const z=getZone();
  if(z!==curZone){curZone=z;const el=document.getElementById('zone');el.textContent=z;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',3000);}

  // Warnings
  if(P.faim<20&&Math.floor(gt*2)%240===0)msg('🍖 Vous avez faim !<br>Cherchez des fruits ou pêchez.',3);
  if(P.soif<20&&Math.floor(gt*2)%180===0)msg('💧 Vous avez soif !<br>Trouvez le puits au village.',3);

  // Clock
  const hh=Math.floor(gt/60),mm2=Math.floor(gt%60);
  document.getElementById('clock').textContent=`${night?'🌙':'☀️'} Jour ${day} · ${String(hh).padStart(2,'0')}:${String(mm2).padStart(2,'0')}`;

  // Bars
  const q=(id,v)=>{const el=document.getElementById(id);el.querySelector('.bf').style.width=v+'%';};
  q('bHp',P.hp);q('bFm',P.faim);q('bSo',P.soif);q('bFt',P.fat);
  document.getElementById('bHp').querySelector('.bf').style.background=
    P.hp<30?'linear-gradient(90deg,#e74c3c,#c0392b)':'linear-gradient(90deg,#2ecc71,#27ae60)';

  if(msgT>0){msgT-=dt;if(msgT<=0)document.getElementById('msg').style.opacity='0';}
  if(hintT>0){hintT-=dt;if(hintT<=0)document.getElementById('hint').style.opacity='0';}
}

// ═══════════════════════════════════════════════════════════════════
//  DRAW — MAIN
// ═══════════════════════════════════════════════════════════════════
function draw(){
  // Sky
  if(night){
    const sk=ctx.createLinearGradient(0,0,0,H);
    sk.addColorStop(0,'#0a0a1a');sk.addColorStop(1,'#0d0d2e');
    ctx.fillStyle=sk;ctx.fillRect(0,0,W,H);
    // Stars
    const t0=Math.floor(Date.now()/3000);
    for(let i=0;i<80;i++){
      const sx=(i*137.5)%W, sy=(i*89.3)%H*.7;
      const tw=Math.sin(Date.now()*.002+i)*.5+.5;
      ctx.fillStyle=`rgba(255,255,255,${.3+tw*.7})`;
      ctx.beginPath();ctx.arc(sx,sy,i%3===0?1.5:1,0,Math.PI*2);ctx.fill();
    }
    // Moon
    ctx.fillStyle='rgba(255,255,200,.9)';ctx.beginPath();ctx.arc(W*.8,60,30,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(240,240,180,.7)';ctx.beginPath();ctx.arc(W*.8-8,56,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=night?'rgba(10,10,30,.6)':'transparent';
    ctx.beginPath();ctx.arc(W*.8+4,60,24,0,Math.PI*2);ctx.fill();
  }else{
    const sk=ctx.createLinearGradient(0,0,0,H*.5);
    sk.addColorStop(0,'#42AAFE');sk.addColorStop(.6,'#7EC8F5');sk.addColorStop(1,'#B8E0FF');
    ctx.fillStyle=sk;ctx.fillRect(0,0,W,H*.5);
    // Sun
    const sg=ctx.createRadialGradient(80,70,0,80,70,50);
    sg.addColorStop(0,'#FFEE58');sg.addColorStop(.4,'#FFD600');sg.addColorStop(1,'rgba(255,214,0,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(80,70,50,0,Math.PI*2);ctx.fill();
    drawClouds();
  }

  // Tiles
  const r0=Math.max(0,Math.floor(camY/TS)-1),r1=Math.min(ROWS,Math.ceil((camY+H)/TS)+1);
  const c0=Math.max(0,Math.floor(camX/TS)-1),c1=Math.min(COLS,Math.ceil((camX+W)/TS)+1);
  for(let r=r0;r<r1;r++)for(let c=c0;c<c1;c++)if(map[r][c]!==T.HOUSE)drawTile(r,c);

  // Objects (behind player)
  objs.filter(o=>o.type!=='house'&&o.row*TS<P.y).forEach(drawObj);

  // Trees behind player
  trees.filter(t=>t.y<P.y+20).forEach(drawTree);

  // Houses (behind player)
  objs.filter(o=>o.type==='house'&&o.or*TS<P.y).forEach(drawHouse);

  // Animals & NPCs behind player
  [...animals,...npcs].filter(a=>a.y<P.y).forEach(a=>a.vx!==undefined&&a.name?drawNPC(a):drawAnimal(a));

  // Player
  drawPlayer();

  // Trees in front
  trees.filter(t=>t.y>=P.y+20).forEach(drawTree);

  // Houses in front
  objs.filter(o=>o.type==='house'&&o.or*TS>=P.y).forEach(drawHouse);

  // Objects in front
  objs.filter(o=>o.type!=='house'&&o.row*TS>=P.y).forEach(drawObj);

  // Animals & NPCs in front
  [...animals,...npcs].filter(a=>a.y>=P.y).forEach(a=>a.name?drawNPC(a):drawAnimal(a));

  // Particles
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.fillStyle=p.color;ctx.globalAlpha=a;
    ctx.beginPath();ctx.arc(p.x-camX,p.y-camY,p.size*a,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  drawMinimap();
}

// ═══════════════════════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════════════════════
function loop(now){
  const dt=Math.min((now-lt)/1000,.08);lt=now;
  update(dt);draw();requestAnimationFrame(loop);
}

// Welcome
setTimeout(()=>msg('🌴 <b>Bienvenue à Madagascar !</b><br>Flèches / ZQSD pour vous déplacer<br>[E] pour interagir avec les objets',5),600);
setTimeout(()=>msg('🏠 Le <b>Village Malgache</b> est devant vous !<br>Puits, Marché, Feu de camp vous attendent.',4),7000);
setTimeout(()=>msg('⚠️ Méfiez-vous du <b>Krokodily</b> dans la rivière<br>et du <b>Fosa</b> la nuit tombée !',4),13000);

requestAnimationFrame(loop);
</script>
